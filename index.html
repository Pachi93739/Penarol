<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<title>Mini Chat ⚽</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  margin-top: 80px;
  background-color: #111;
  color: #ffd700;
}

input {
  padding: 10px;
  width: 300px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 12px 25px;
  font-size: 16px;
  margin-left: 10px;
  background-color: #ffd700;
  color: black;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

#chat {
  margin-top: 30px;
  width: 400px;
  margin-left: auto;
  margin-right: auto;
  text-align: left;
  background: #222;
  padding: 15px;
  border-radius: 10px;
  height: 320px;
  overflow-y: auto;
}

.msg {
  margin: 10px 0;
}

.user {
  color: white;
}

.bot {
  color: #ffd700;
}
</style>
</head>

<body>

<h1>Mini Chat ⚽</h1>

<input type="text" id="pregunta" placeholder="Escribí tu pregunta...">
<button onclick="responder()">Enviar</button>

<div id="chat"></div>

<script>
const input = document.getElementById("pregunta");

input.addEventListener("keypress", function(event) {
  if (event.key === "Enter") {
    responder();
  }
});

function responder() {
  const texto = input.value.toLowerCase();
  const chat = document.getElementById("chat");

  if (texto.trim() === "") return;

  chat.innerHTML += `<div class="msg user">Vos: ${input.value}</div>`;

  let respuesta = "";

  if (texto.includes("hola")) {
    respuesta = "Hola 😄 ¿Qué querés saber?";
  }

  else if (texto.includes("estadio campeón del siglo")) {
    respuesta =
      "El Estadio Campeón del Siglo es la casa de Peñarol 🏟️<br>" +
      "- Ubicado en Montevideo<br>" +
      "- Inaugurado en 2016<br>" +
      "- Capacidad: ~40.000 personas<br>" +
      "- El estadio más moderno de Uruguay";
  }

  else if (
    texto.includes("jugador histórico") ||
    texto.includes("jugadores históricos") ||
    texto.includes("mejor jugador") ||
    texto.includes("mejores jugadores")
  ) {
    respuesta =
      "Jugadores históricos de Peñarol 🟡⚫:<br><br>" +
      "- Fernando Morena ⚽<br>" +
      "- Diego Aguirre 🏆<br>" +
      "- Pablo Bengoechea 🎯<br>" +
      "- Leo Fernández 🔥";
  }

  else if (
    texto.includes("más grande") ||
    texto.includes("mejor club")
  ) {
    respuesta = "Peñarol es el club más grande del mundo 😎";
  }

  else if (texto.includes("nacional")) {
    respuesta = "La gallina de Uruguay 🐔";
  }

  else if (texto.includes("libertadores")) {
    respuesta = "Peñarol tiene 5 Copas Libertadores 🏆";
  }

  else {
    respuesta = "No entendí 😅";
  }

  chat.innerHTML += `<div class="msg bot">Bot: ${respuesta}</div>`;

  input.value = "";
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
